# Copia este archivo como application.properties y llena los valores

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

server.port=${PORT:8080}

# CORS local. En Render configura la variable de entorno CORS_ORIGINS con la URL del frontend:
# CORS_ORIGINS=https://proyectonexus.vercel.app
spring.web.cors.allowed-origin-patterns=http://localhost:*
